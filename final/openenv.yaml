spec_version: 1
name: shopping_cart_env
description: "An environment for managing a shopping cart, including adding, removing, updating items, and checkout. Scoring is strictly between 0.1 and 0.9."
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy
    name: "Add and Checkout"
    description: "Add 2 apples to the cart and checkout."
    difficulty: easy
    grader:
      type: programmatic
  - id: medium
    name: "Modify and Checkout"
    description: "Add 3 bananas, remove 1, add 1 milk, and checkout."
    difficulty: medium
    grader:
      type: programmatic
  - id: hard
    name: "Complex Order and Checkout"
    description: "Add 5 oranges, update to 2, add 1 bread, and checkout."
    difficulty: hard
    grader:
      type: programmatic

